<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Golf-Maniac: Puzzle Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
      body {
        margin: 0;
        background: #1a1a1a;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
        font-family: "Segoe UI", sans-serif;
        overflow: hidden;
      }
      #interfaz {
        position: absolute;
        top: 10px;
        width: 100%;
        text-align: center;
        pointer-events: none;
        z-index: 10;
      }
      .stats {
        background: rgba(0, 0, 0, 0.8);
        padding: 10px 20px;
        border-radius: 10px;
        border: 2px solid #a3d900;
        display: inline-block;
        font-size: 18px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="interfaz">
      <div class="stats">
        NIVEL <span id="lvl">1</span> (Par <span id="par">3</span>) | GOLPES:
        <span id="contador">0</span> | PUNTOS: <span id="puntos">0</span>
      </div>
    </div>
    <script>
      // --- CONFIGURACIÓN DE NIVELES (Formato Vertical 600x800) ---
      const niveles = [
        // Nivel 1: Básico
        {
          par: 2,
          bola: { x: 300, y: 700 },
          hoyo: { x: 300, y: 100 },
          muros: [{ x: 300, y: 400, w: 300, h: 40 }],
        },
        // Nivel 2: Laberinto Zig-Zag
        {
          par: 3,
          bola: { x: 100, y: 700 },
          hoyo: { x: 500, y: 100 },
          muros: [
            { x: 200, y: 500, w: 400, h: 40 }, // Muro desde la izquierda
            { x: 400, y: 300, w: 400, h: 40 }, // Muro desde la derecha
          ],
        },
        // Nivel 3: Trampa de Arena
        {
          par: 3,
          bola: { x: 300, y: 700 },
          hoyo: { x: 300, y: 100 },
          muros: [],
          arena: [{ x: 300, y: 400, w: 600, h: 250 }], // Ocupa todo el centro
        },
        // Nivel 4: Rebotadores y Agua
        {
          par: 4,
          bola: { x: 300, y: 700 },
          hoyo: { x: 300, y: 100 },
          agua: [
            { x: 150, y: 500, w: 200, h: 200 },
            { x: 450, y: 300, w: 200, h: 200 },
          ],
          bumpers: [
            { x: 300, y: 400 },
            { x: 150, y: 250 },
            { x: 450, y: 550 },
          ],
          muros: [],
        },
      ];

      const config = {
        type: Phaser.AUTO,
        width: 600, // Pantalla más estrecha
        height: 800, // Pantalla más alta
        physics: {
          default: "matter",
          matter: { gravity: { y: 0 }, debug: false },
        },
        scene: { create: create },
      };

      const juego = new Phaser.Game(config);

      let escena,
        bola,
        guia,
        activo = false;
      let golpesNivel = 0,
        puntuacionGlobal = 0,
        nivelActual = 0;
      let grupoObjetos = [],
        nivelCompletado = false;

      function create() {
        escena = this;
        escena.cameras.main.setBackgroundColor("#2d572c");

        // --- GENERAR GRÁFICOS INTERNOS ---
        let g = escena.make.graphics({ x: 0, y: 0, add: false });
        g.fillStyle(0xffffff)
          .fillCircle(10, 10, 10)
          .generateTexture("t_bola", 20, 20);
        g.clear();
        g.fillStyle(0x000000)
          .fillCircle(15, 15, 15)
          .generateTexture("t_hoyo", 30, 30);
        g.clear();
        g.fillStyle(0x888888)
          .fillRect(0, 0, 32, 32)
          .generateTexture("t_muro", 32, 32);
        g.clear();
        g.fillStyle(0xd4b857, 0.6)
          .fillRect(0, 0, 32, 32)
          .generateTexture("t_arena", 32, 32);
        g.clear();
        g.fillStyle(0x3498db, 0.7)
          .fillRect(0, 0, 32, 32)
          .generateTexture("t_agua", 32, 32);
        g.clear();
        g.fillStyle(0xff0044)
          .fillCircle(15, 15, 15)
          .generateTexture("t_bumper", 30, 30);
        g.clear();

        guia = escena.add.graphics();

        // --- EVENTOS DEL RATÓN ---
        escena.input.on("pointerdown", () => {
          if (bola && bola.body.speed < 0.2) activo = true;
        });

        escena.input.on("pointermove", (p) => {
          if (activo) {
            guia.clear().lineStyle(4, 0xffffff, 0.6);
            guia.lineBetween(bola.x, bola.y, p.x, p.y);
          }
        });

        escena.input.on("pointerup", (p) => {
          if (activo) {
            activo = false;
            guia.clear();
            const angulo = Phaser.Math.Angle.Between(p.x, p.y, bola.x, bola.y);
            let dist = Phaser.Math.Distance.Between(p.x, p.y, bola.x, bola.y);
            dist = Math.min(dist, 120); // Limitar potencia
            const fuerza = dist * 0.0007;

            bola.applyForce({
              x: Math.cos(angulo) * fuerza,
              y: Math.sin(angulo) * fuerza,
            });

            golpesNivel++;
            actualizarUI();
          }
        });

        // --- LÓGICA DE COLISIONES ---
        escena.matter.world.on("collisionstart", (e) => {
          e.pairs.forEach((p) => {
            let A = p.bodyA.gameObject,
              B = p.bodyB.gameObject;
            if (!A || !B) return;

            let b = null,
              obj = null;
            if (A.getData("tipo") === "bola") {
              b = A;
              obj = B;
            } else if (B.getData("tipo") === "bola") {
              b = B;
              obj = A;
            }

            if (b && obj) {
              let tipo = obj.getData("tipo");
              if (tipo === "hoyo" && !nivelCompletado) {
                nivelCompletado = true;
                procesarVictoria();
              } else if (tipo === "agua") {
                b.setPosition(b.getData("origenX"), b.getData("origenY"));
                b.setVelocity(0, 0);
                golpesNivel++; // Penalización
                actualizarUI();
              } else if (tipo === "arena") {
                b.setFrictionAir(0.12);
              }
            }
          });
        });

        escena.matter.world.on("collisionend", (e) => {
          e.pairs.forEach((p) => {
            let A = p.bodyA.gameObject,
              B = p.bodyB.gameObject;
            if (!A || !B) return;
            let b =
              A.getData("tipo") === "bola"
                ? A
                : B.getData("tipo") === "bola"
                  ? B
                  : null;
            let obj = b === A ? B : A;
            if (b && obj && obj.getData("tipo") === "arena") {
              b.setFrictionAir(0.02);
            }
          });
        });

        cargarNivel();
      }

      function crearParedesBorde() {
        // Paredes que rodean toda la pantalla (Arriba, Abajo, Izquierda, Derecha)
        const bordes = [
          { x: 300, y: 10, w: 600, h: 20 },
          { x: 300, y: 790, w: 600, h: 20 },
          { x: 10, y: 400, w: 20, h: 800 },
          { x: 590, y: 400, w: 20, h: 800 },
        ];
        bordes.forEach((b) => {
          let muro = escena.add.tileSprite(b.x, b.y, b.w, b.h, "t_muro");
          escena.matter.add.gameObject(muro, { isStatic: true });
          grupoObjetos.push(muro);
        });
      }

      function cargarNivel() {
        nivelCompletado = false;
        golpesNivel = 0; // Se resetean los golpes al cambiar de hoyo
        const d = niveles[nivelActual];
        actualizarUI();

        if (bola) bola.destroy();
        grupoObjetos.forEach((o) => o.destroy());
        grupoObjetos = [];

        crearParedesBorde();

        // Hoyo
        let h = escena.matter.add.image(d.hoyo.x, d.hoyo.y, "t_hoyo", null, {
          isStatic: true,
          isSensor: true,
        });
        h.setData("tipo", "hoyo");
        grupoObjetos.push(h);

        // Muros
        if (d.muros)
          d.muros.forEach((m) => {
            let muro = escena.add.tileSprite(m.x, m.y, m.w, m.h, "t_muro");
            escena.matter.add.gameObject(muro, { isStatic: true });
            grupoObjetos.push(muro);
          });

        // Arena
        if (d.arena)
          d.arena.forEach((a) => {
            let arena = escena.add.tileSprite(a.x, a.y, a.w, a.h, "t_arena");
            escena.matter.add.gameObject(arena, {
              isStatic: true,
              isSensor: true,
            });
            arena.setData("tipo", "arena");
            grupoObjetos.push(arena);
          });

        // Agua
        if (d.agua)
          d.agua.forEach((a) => {
            let agua = escena.add.tileSprite(a.x, a.y, a.w, a.h, "t_agua");
            escena.matter.add.gameObject(agua, {
              isStatic: true,
              isSensor: true,
            });
            agua.setData("tipo", "agua");
            grupoObjetos.push(agua);
          });

        // Bumpers
        if (d.bumpers)
          d.bumpers.forEach((b) => {
            let bumper = escena.matter.add.image(b.x, b.y, "t_bumper", null, {
              isStatic: true,
            });
            bumper.setCircle(15);
            bumper.setBounce(1.5);
            grupoObjetos.push(bumper);
          });

        // Bola
        bola = escena.matter.add.image(d.bola.x, d.bola.y, "t_bola");
        bola.setCircle(10);
        bola.setFrictionAir(0.02);
        bola.setBounce(0.8);
        bola.setData("tipo", "bola");
        bola.setData("origenX", d.bola.x);
        bola.setData("origenY", d.bola.y);
      }

      function procesarVictoria() {
        const par = niveles[nivelActual].par;
        const diferencia = golpesNivel - par;
        puntuacionGlobal += diferencia;
        actualizarUI();

        let mensaje = "";
        if (golpesNivel === 1) mensaje = "¡Hoyo en 1! 🤯";
        else if (diferencia <= -2) mensaje = "¡Eagle! 🦅";
        else if (diferencia === -1) mensaje = "¡Birdie! 🐦";
        else if (diferencia === 0) mensaje = "¡Par! ⛳";
        else if (diferencia === 1) mensaje = "¡Bogey! 🤨";
        else if (diferencia >= 2) mensaje = "¡Doble Bogey! 😫";

        setTimeout(() => {
          alert(`${mensaje}\nGolpes: ${golpesNivel} (Par ${par})`);
          nivelActual++;
          if (nivelActual < niveles.length) {
            cargarNivel();
          } else {
            let finalMsg =
              puntuacionGlobal < 0
                ? "¡Excelente puntuación bajo par!"
                : "Prueba a mejorar esos golpes.";
            alert(
              `¡JUEGO COMPLETADO!\nPuntuación Final: ${puntuacionGlobal > 0 ? "+" + puntuacionGlobal : puntuacionGlobal}\n${finalMsg}`,
            );
            location.reload();
          }
        }, 100);
      }

      function actualizarUI() {
        document.getElementById("lvl").innerText = nivelActual + 1;
        document.getElementById("par").innerText = niveles[nivelActual]
          ? niveles[nivelActual].par
          : 0;
        document.getElementById("contador").innerText = golpesNivel;
        // Poner el símbolo + si es positivo, para que parezca de golf de verdad
        let puntosTexto =
          puntuacionGlobal > 0 ? "+" + puntuacionGlobal : puntuacionGlobal;
        document.getElementById("puntos").innerText = puntosTexto;
      }
    </script>
  </body>
</html>
